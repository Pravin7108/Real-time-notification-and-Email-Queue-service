<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Queue Dashboard</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#eef2f7,#dfe7f3);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.log-time { opacity: 0.5; margin-right: 0.5rem; }
    .log-status {
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.65rem;
      margin-right: 0.5rem;
      letter-spacing: 0.05em;
    }

.container{
    width:450px;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
}

textarea{
    height:90px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:#4f46e5;
    color:white;
    border:none;
    border-radius:6px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#3730a3;
}

.response{
    margin-top:10px;
    text-align:center;
    font-weight:bold;
}

.statusGrid{
    margin-top:25px;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;
}

.card{
    padding:15px;
    border-radius:8px;
    color:white;
    text-align:center;
    font-weight:bold;
}

.waiting{ background:#facc15; color:#000 }
.active{ background:#3b82f6 }
.completed{ background:#22c55e }
.failed{ background:#ef4444 }

.count{
    font-size:22px;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Email Notification</h2>

<input type="email" id="to" placeholder="Recipient Email">

<input type="text" id="subject" placeholder="Subject">

<textarea id="message" placeholder="Message"></textarea>

<button onclick="sendEmail()">Send Email</button>

<div id="responseMessage" class="response"></div>

<div class="statusGrid">

<div class="card waiting">
Waiting
<div class="count" id="waiting">0</div>
</div>

<div class="card active">
Active
<div class="count" id="active">0</div>
</div>

<div class="card completed">
Completed
<div class="count" id="completed">0</div>
</div>

<div class="card failed">
Failed
<div class="count" id="failed">0</div>
</div>

</div>

<div id="log"></div>
</div>

<script>


function updateStatus(data){
    document.getElementById("waiting").innerText = data.counts.waiting;
    document.getElementById("active").innerText = data.counts.active;
    document.getElementById("completed").innerText = data.counts.completed;
    document.getElementById("failed").innerText = data.counts.failed;
}

async function sendEmail(){

    const to = document.getElementById("to").value;
    const subject = document.getElementById("subject").value;
    const message = document.getElementById("message").value;

    const responseBox = document.getElementById("responseMessage");

    try{

        const res = await fetch("http://localhost:3000/notifications/email",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({to,subject,message})
        });

        const data = await res.json();

        responseBox.style.color="green";
        responseBox.innerText = data.message || "Email queued successfully";

        document.getElementById("to").value="";
        document.getElementById("subject").value="";
        document.getElementById("message").value="";

    }catch(err){

        responseBox.style.color="red";
        responseBox.innerText="Failed to send email request";

    }
}

async function fetchQueueStatus(){

    try{

        const res = await fetch("http://localhost:3000/notifications/queue-status");
        const data = await res.json();

        updateStatus(data);

    }catch(err){
        console.log("Queue fetch failed");
    }

}

fetchQueueStatus();


const socket = io(`http://localhost:3000/`, { transports: ["websocket", "polling"] });

socket.on("notification-status", (data) => {
      addLog(data.status, data.email, null, data.timestamp, data.jobId, data.error);
      fetchQueueStatus();
    });

    function formatTime(iso) {
      const d = iso ? new Date(iso) : new Date();
      return d.toTimeString().slice(0, 8);
    }

    function addLog(status, email, customMsg, timestamp, jobId, error) {
      const log = document.getElementById("log");
      const el = document.createElement("div");
      el.className = `log-entry ${status}`;

      const statusLabels = {
        queued: "QUEUED", processing: "PROCESSING",
        sent: "SENT", failed: "FAILED ✗", system: "SYS",
      };

      const msg = customMsg
        || (email ? `${email}${jobId ? ` #${jobId.slice(0,8)}` : ""}${error ? ` — ${error}` : ""}` : "");

      el.innerHTML =
        `<span class="log-time">${formatTime(timestamp)}</span>` +
        `<span class="log-status">${statusLabels[status] || status}</span>` +
        msg;

      log.prepend(el);
      while (log.children.length > 100) log.removeChild(log.lastChild);
    }




</script>

</body>
</html>
